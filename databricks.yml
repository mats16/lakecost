bundle:
  name: lakecost

include:
  - resources/*.yml

variables:
  sql_warehouse_id:
    description: ID of the Serverless SQL warehouse the app should use
  lakebase_instance_name:
    description: Optional Lakebase database instance name (leave empty to use SQLite)
    default: ''

targets:
  dev:
    # Bare `databricks bundle deploy` targets dev; prod always requires `-t prod`.
    # mode: development prefixes resources with [dev <user>] to avoid prod collisions.
    default: true
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
